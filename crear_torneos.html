<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starleague</title>

    <link rel="icon" type="image/png" href="images/logo.png" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/crear-torneos.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="contenedor">
      <header>
        <button id="menuBtn">
          <i class="fa-solid fa-bars"></i>
        </button>

        <a href="index.html">
          <img src="images/logo.png" alt="Logo Starleague" class="logo" />
        </a>

        <div class="title">☆ Crear Torneos ☆</div>
      </header>

      <div class="contenido">
        <aside>
          <div id="barraNavegacion">
            <nav>
              <ul>
                <li>
                  <a href="index.html">
                    <i class="fa-solid fa-house"></i>
                    Inicio
                  </a>
                </li>

                <li class="menu-grupo">
                  <div class="menu-padre">
                    <i class="fa-solid fa-trophy"></i>
                    Torneos
                  </div>

                  <ul class="submenu">
                    <li><a href="ver_torneos.html">Ver Torneos</a></li>
                    <li><a href="torneos_resultados.html">Resultados</a></li>
                    <li>
                      <a class="activo" href="crear_torneos.html"
                        >Crear Torneo</a
                      >
                    </li>
                  </ul>
                </li>

                <li class="menu-grupo">
                  <div class="menu-padre">
                    <i class="fa-solid fa-users"></i>
                    Equipos
                  </div>

                  <ul class="submenu">
                    <li><a href="buscar_equipos.html">Buscar Equipos</a></li>
                    <li><a href="crear_equipos.html">Crear Equipo</a></li>
                  </ul>
                </li>

                <li class="menu-grupo">
                  <div class="menu-padre">
                    <i class="fa-solid fa-user"></i>
                    Usuario
                  </div>

                  <ul class="submenu">
                    <li><a href="usuario_perfil.html">Perfil</a></li>
                    <li><a href="usuario_config.html">Configuración</a></li>
                  </ul>
                </li>
              </ul>
            </nav>
          </div>
        </aside>
        <div id="menuOverlay"></div>
        <main>
          <article>
            <form id="formCrearTorneo">

              <!-- Información General -->
              <div class="seccionFormulario" id="seccionInformacionGeneral">
                <h1>Información General</h1>
                <div class="camposFormulario" id="informacionGeneral">
                  <div class="campoFormulario">
                    <label for="nombreTorneo">Nombre del torneo:</label>

                    <input
                      type="text"
                      id="nombreTorneo"
                      name="nombreTorneo"
                      maxlength="100"
                      required
                    />
                  </div>

                  <!-- Descripción -->
                  <div class="campoFormulario">
                    <label for="descripcion">Descripción:</label>

                    <textarea
                      id="descripcion"
                      name="descripcion"
                      maxlength="500"
                    ></textarea>
                  </div>

                <!-- Configuración del Torneo -->
              <div class="seccionFormulario" id="seccionConfiguracionTorneo">
                <h1>Configuración del Torneo:</h1>
                <div class="camposFormulario" id="configuracionTorneo"></div>
              </div>

                  <!-- Caregoría -->
                  <div class="campoFormulario">
                    <label for="categoria">Categoría:</label>

                    <select id="categoria" name="categoria" required>
                      <option value="">Seleccione una categoría</option>
                      <option value="esports">eSports</option>
                      <option value="tradicional">Deporte Tradicional</option>
                    </select>
                  </div>

                  <!-- Disciplina -->
                  <div class="campoFormulario">
                    <label for="deporte">Disciplina:</label>

                    <select id="deporte" name="deporte" required>
                      <option value="">Seleccione una disciplina</option>
                    </select>
                  </div>

                  <!-- Formato -->
                  <div class="campoFormulario">
                    <label for="formato">Formato del torneo:</label>

                    <select id="formato" name="formato" required>
                      <option value="">Seleccione un formato:</option>
                    </select>
                  </div>

                  <!-- Cantidad -->
                  <div class="campoFormulario">
                    <label id="labelCantidad" for="cantidadParticipantes">
                      Cantidad:
                    </label>
                    <input
                      type="number"
                      id="cantidadParticipantes"
                      name="cantidadParticipantes"
                      min="2"
                      required
                    />
                  </div>

                  <!-- Fechas -->
                  <div class="campoFormulario">
                    <label for="fechaInicio">Fecha de inicio:</label>
                    <input type="date" id="fechaInicio" name="fechaInicio" />
                  </div>

                  <div class="campoFormulario">
                    <label for="fechaFin">Fecha de fin:</label>
                    <input type="date" id="fechaFin" name="fechaFin" />
                  </div>
                </div>
              </div>

              <!-- Configuración del Deporte
              <div class="seccionFormulario" id="seccionConfiguracionDeporte">
                <h1>Configuración del Deporte:</h1>
                <div class="camposFormulario" id="configuracionDeporte"></div>
              </div> -->



              <!-- Participantes -->
              <div class="seccionFormulario" id="seccionParticipantes">
                <h1>Participantes:</h1>
                <div class="camposFormulario" id="participantes"></div>
              </div>

              <!-- Apariencia -->
              <div class="seccionFormulario" id="seccionApariencia">
                <h1>Apariencia:</h1>
                <div class="camposFormulario" id="apariencia"></div>
              </div>

              <!-- Botón de enviar -->
              <div class="accionesFormulario">
                <button type="submit" class="botonEnviar">
                  <i class="fa-solid fa-floppy-disk"></i>
                  Crear Torneo
                </button>
              </div>
            </form>
          </article>
        </main>
      </div>
    </div>

    <button id="btnSubir">
      <i class="fa-solid fa-chevron-up"></i>
    </button>

    <script src="js/script.js" defer></script>
    <script src="js/torneos/catalogos.js"></script>
    <script src="js/torneos/crear-torneos.js"></script>
  </body>
</html>
